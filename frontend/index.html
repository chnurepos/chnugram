<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CHNUgram - Корпоративний месенджер Чернівецького національного університету" />
    <title>CHNUgram</title>
    <!-- Apply theme before React mounts to avoid flash of wrong theme -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('chnugram-theme');
          var theme = stored ? JSON.parse(stored).state?.theme : null;
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
